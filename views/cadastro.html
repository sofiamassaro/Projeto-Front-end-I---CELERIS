<section class="document-section" id="view-cadastro" style="display: none;">
  <div class="fila-container">
    <div class="fila-header">
      <div>
        <h2 class="fila-title">Cadastrar Petição</h2>
        <p class="fila-subtitle">Preencha os dados básicos do processo para incluir na fila</p>
      </div>
    </div>

    <div class="cadastro-form">

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Número do Processo <span class="form-required">*</span></label>
          <input type="text" class="form-input" id="cad-numero"
            placeholder="0000000-00.0000.8.24.0000" maxlength="25">
        </div>
        <div class="form-group form-group--sm">
          <label class="form-label">Data de Entrada <span class="form-required">*</span></label>
          <input type="date" class="form-input" id="cad-data">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Requerente (Autor) <span class="form-required">*</span></label>
          <input type="text" class="form-input" id="cad-requerente" placeholder="Nome completo">
        </div>

        <div class="form-group form-group--sm">
          <label class="form-label">CPF (Autor) <span class="form-required">*</span></label>
          <input type="text" class="form-input" id="cad-cpf" placeholder="000.000.000-00" maxlength="14">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Requerido (Réu) <span class="form-required">*</span></label>
          <input type="text" class="form-input" id="cad-requerido" placeholder="Nome da instituição ou pessoa">
        </div>

        <div class="form-group form-group--sm">
          <label class="form-label">CPF (Réu) <span class="form-required">*</span></label>
          <input type="text" class="form-input" id="cad-cpf-requerido" placeholder="000.000.000-00" maxlength="14">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Classe Processual <span class="form-required">*</span></label>
          <select class="form-input form-select" id="cad-classe">
            <option value="" disabled selected>Selecione a classe...</option>
            <option value="Ação Revisional de Juros">Ação Revisional de Juros</option>
            <option value="Indenização por Dano Moral">Indenização por Dano Moral</option>
            <option value="Cobrança Indevida de Tarifas">Cobrança Indevida de Tarifas</option>
            <option value="Negativação Indevida no SPC/Serasa">Negativação Indevida no SPC/Serasa</option>
            <option value="Revisão de Contrato de Financiamento">Revisão de Contrato de Financiamento</option>
            <option value="Revisão de Empréstimo Consignado">Revisão de Empréstimo Consignado</option>
            <option value="Revisão de Limite de Crédito">Revisão de Limite de Crédito</option>
            <option value="Execução de Título Extrajudicial">Execução de Título Extrajudicial</option>
            <option value="Ação Monitória">Ação Monitória</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div class="form-group form-group--sm">
          <label class="form-label">Prioridade</label>
          <select class="form-input form-select" id="cad-prioridade">
            <option value="normal">Normal</option>
            <option value="prioritario">Prioritário</option>
            <option value="urgente">Urgente</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tags Geradas Automaticamente</label>
        <div class="form-tags-preview" id="cad-tags-preview">
          <span class="form-tags-placeholder">Selecione a classe processual para gerar as tags</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Conteúdo da Petição <span class="form-required">*</span></label>
        <textarea class="form-input form-textarea form-textarea--lg" id="cad-conteudo"
          placeholder="Descreva os fatos e fundamentos jurídicos da petição..." rows="5"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Observações Internas</label>
        <textarea class="form-input form-textarea" id="cad-obs"
          placeholder="Notas internas do servidor (não constam no processo)..." rows="2"></textarea>
      </div>

      <div class="form-error" id="form-error" style="display:none;">
        <i class="fas fa-exclamation-circle"></i>
        <span id="form-error-msg">Preencha todos os campos obrigatórios.</span>
      </div>

      <div class="form-actions">
        <button class="btn-voltar" id="btn-cancelar-cadastro">
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button class="btn btn-blue btn-cadastrar" id="btn-revisar-cadastro">
          <i class="fas fa-eye"></i> Revisar Cadastro
        </button>
      </div>

    </div>
  </div>
</section>
