<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celeris - Triagem Inteligente</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <!-- Sidebar será injetada aqui pelo loadViews.js -->
    <div id="slot-sidebar"></div>

    <!-- Área principal -->
    <main class="main-content">

      <header class="top-header">
        <div class="header-info">
          <span>Fila de Entrada: <strong>Vara Bancária - Comarca de Florianópolis</strong></span>
        </div>
        <div class="user-profile">
          <span>Servidor: <strong>Sofi Massaro</strong></span>
          <div class="avatar">SM</div>
        </div>
      </header>

      <!-- Barra de progresso do fluxo -->
      <div class="workflow-bar">
        <div class="workflow-step" data-step="upload">
          <div class="workflow-step-num">1</div>
          <span>Upload PDF</span>
        </div>
        <div class="workflow-divider"></div>
        <div class="workflow-step" data-step="cadastrar">
          <div class="workflow-step-num">2</div>
          <span>Cadastro</span>
        </div>
        <div class="workflow-divider"></div>
        <div class="workflow-step" data-step="triagem">
          <div class="workflow-step-num">3</div>
          <span>Triagem</span>
        </div>
        <div class="workflow-divider"></div>
        <div class="workflow-step" data-step="analise">
          <div class="workflow-step-num">4</div>
          <span>Análise</span>
        </div>
        <div class="workflow-divider"></div>
        <div class="workflow-step" data-step="concluido">
          <div class="workflow-step-num">5</div>
          <span>Concluído</span>
        </div>
      </div>

      <!-- Views injetadas dinamicamente -->
      <div id="slot-upload"></div>
      <div id="slot-fila"></div>
      <div id="slot-documento"></div>
      <div id="slot-generica"></div>
      <div id="slot-cadastro"></div>
      <div id="slot-confirmacao"></div>

    </main>

    <!-- Painel de IA será injetado aqui pelo loadViews.js -->
    <div id="slot-ai-panel"></div>

  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
