<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celeris - Triagem Inteligente</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">

    <!-- Sidebar será injetada aqui pelo loadViews.js -->
    <div id="slot-sidebar"></div>

    <!-- Área principal -->
    <main class="main-content">

      <header class="top-header">
        <div class="header-info">
          <span>Fila de Entrada: <strong>Vara Bancária - Comarca de Florianópolis</strong></span>
        </div>
        <div class="user-profile">
          <span>Servidor: <strong>Sofi Massaro</strong></span>
          <div class="avatar">SM</div>
        </div>
      </header>

      <!-- Views injetadas dinamicamente -->
      <div id="slot-fila"></div>
      <div id="slot-documento"></div>
      <div id="slot-generica"></div>
      <div id="slot-cadastro"></div>
      <div id="slot-confirmacao"></div>

    </main>

    <!-- Painel de IA será injetado aqui pelo loadViews.js -->
    <div id="slot-ai-panel"></div>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
